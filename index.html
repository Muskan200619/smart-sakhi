<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Sakhi | IoT Prototype Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary-pink: #ff2d75;
            --dark-blue: #1a2a3a;
            --light-bg: #f8f9fc;
            --success-green: #2ecc71;
            --danger-red: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: var(--light-bg);
            display: flex;
        }

        .sidebar {
            width: 250px;
            background: var(--dark-blue);
            height: 100vh;
            color: white;
            position: fixed;
            padding: 20px;
            box-sizing: border-box;
            z-index: 1000;
        }

        .logo-area {
            text-align: center;
            padding-bottom: 30px;
            border-bottom: 1px solid #34495e;
        }

        .logo-area i {
            font-size: 50px;
            color: var(--primary-pink);
            margin-bottom: 10px;
        }

        .main {
            margin-left: 260px;
            flex: 1;
            padding: 30px;
        }

        .live-kit-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            border-left: 10px solid var(--primary-pink);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .kit-value {
            font-size: 64px;
            font-weight: bold;
            color: var(--dark-blue);
        }

        .table-container {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f1f3f5;
            padding: 15px;
            text-align: left;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .status-pill {
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .online { background: #d1e7dd; color: #0f5132; }
        .critical { background: #f8d7da; color: #842029; }

        @media screen and (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; }
            .main { margin-left: 0; padding: 15px; }
            .live-kit-card { flex-direction: column; text-align: center; }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="logo-area">
            <i class="fas fa-female"></i>
            <h2>Smart Sakhi</h2>
            <p style="font-size: 12px; opacity: 0.7;">AKS University Project</p>
        </div>
    </div>

    <div class="main">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>Campus Hygiene Monitoring</h1>
            <div id="live-time" style="font-weight: bold; color: var(--primary-pink);"></div>
        </header>

        <div class="live-kit-card">
            <div>
                <h3 style="margin:0; color: #666;"><i class="fas fa-broadcast-tower"></i> PHYSICAL KIT MODEL</h3>
                <p id="monitoring-loc" style="margin:5px 0; font-weight: bold;">Monitoring: Block A (1st Floor)</p>
            </div>
            <div class="kit-value" id="kit-stock-val">0%</div>
            <div>
                <span id="kit-status-label" class="status-pill online" style="font-size: 16px;">System Ready</span>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Block Location</th>
                        <th>Floor Level</th>
                        <th>Current Stock</th>
                        <th>Machine Status</th>
                    </tr>
                </thead>
                <tbody id="machineBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        setInterval(() => {
            document.getElementById('live-time').innerText = new Date().toLocaleString();
        }, 1000);

        const firebaseConfig = {
            databaseURL: "https://smart-sakhi-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const blocks = ["Block A", "Block B", "Block C", "Block D", "Block E", "Library Block"];
        const floors = ["1st Floor", "2nd Floor", "3rd Floor", "4th Floor"];
        const tableBody = document.getElementById('machineBody');

        blocks.forEach(block => {
            floors.forEach(floor => {
                const stockId = `stock-${block}-${floor}`.replace(/\s+/g, '-');
                const pillId = `pill-${block}-${floor}`.replace(/\s+/g, '-');

                let row = `<tr>
                    <td><b>${block}</b></td>
                    <td>${floor}</td>
                    <td id="${stockId}"><b>0%</b></td>
                    <td><span id="${pillId}" class="status-pill online">Active</span></td>
                </tr>`;
                tableBody.innerHTML += row;

                // --- FIX STARTS HERE ---
                // Humein "1st Floor" ko "1st_Floor" banana hai taaki Arduino ke data se match kare
                let floorPath = floor.replace(" ", "_"); 
                let dbPath = '/AKS_University/${block.replace(" ", "_")}/${floor.replace(" ", "_")}';
                
                database.ref(dbPath).on('value', (snapshot) => {
                    const stock = snapshot.val() || 0;
                    const stockText = document.getElementById(stockId);
                    const pill = document.getElementById(pillId);

                    stockText.innerHTML = `<b>${stock}%</b>`;
                    stockText.style.color = stock < 15 ? 'red' : 'black';
                    pill.className = `status-pill ${stock < 15 ? 'critical' : 'online'}`;
                    pill.innerText = stock < 15 ? 'Low Stock' : 'Active';

                    if (block === "Block A" && floor === "1st Floor") {
                        updateLiveKit(stock);
                    }
                });
            });
        });

        function updateLiveKit(val) {
            const display = document.getElementById('kit-stock-val');
            const label = document.getElementById('kit-status-label');
            display.innerText = val + "%";
            if (val < 15) {
                label.className = "status-pill critical";
                label.innerText = "CRITICAL: REFILL NOW";
            } else {
                label.className = "status-pill online";
                label.innerText = "STOCK HEALTHY";
            }
        }
    </script>
</body>
</html>
