<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Sakhi | IoT Prototype Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary-pink: #ff2d75;
            --dark-blue: #1a2a3a;
            --light-bg: #f8f9fc;
            --success-green: #2ecc71;
            --danger-red: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: var(--light-bg);
            display: flex;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            background: var(--dark-blue);
            height: 100vh;
            color: white;
            position: fixed;
            padding: 20px;
            box-sizing: border-box;
            transition: 0.3s;
            z-index: 1000;
        }

        .logo-area {
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .logo-area i {
            font-size: 40px;
            color: var(--primary-pink);
        }

        .sidebar-menu p {
            padding: 12px 15px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
        }

        .sidebar-menu p:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--primary-pink);
        }

        /* Main Content Styling */
        .main {
            margin-left: 250px;
            padding: 30px;
            width: calc(100% - 250px);
            box-sizing: border-box;
        }

        /* Live Kit Card UI component */
        .live-kit-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--primary-pink);
        }

        .kit-value {
            font-size: 56px;
            font-weight: bold;
            color: var(--dark-blue);
        }

        /* Status Pills */
        .status-pill {
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }

        .online {
            background: #d4edda;
            color: #155724;
        }

        .critical {
            background: #f8d7da;
            color: #842029;
        }

        /* Table UI Styling */
        .table-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th,
        td {
            padding: 15px;
            border-bottom: 1px solid #ededed;
        }

        th {
            background-color: #f1f3f6;
            color: #333;
        }

        /* Mobile Responsive Viewport Logic */
        @media screen and (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 15px;
            }

            .main {
                margin-left: 0;
                padding: 15px;
                width: 100%;
                box-sizing: border-box;
            }

            .live-kit-card {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }

            .kit-value {
                font-size: 48px;
            }

            header {
                flex-direction: column;
                align-items: flex-start !important;
                gap: 10px;
            }

            h1 {
                font-size: 20px;
            }

            .table-container {
                overflow-x: auto;
                display: block;
            }

            table {
                min-width: 500px;
            }
        }
    </style>
</head>

<body>

    <!-- Sidebar Section -->
    <div class="sidebar">
        <div class="logo-area">
            <i class="fas fa-female"></i>
            <h2>Smart Sakhi</h2>
            <p style="font-size: 12px; opacity: 0.7;">AKS University Project</p>
        </div>
        <div class="sidebar-menu" style="margin-top: 30px;">
            <p><i class="fas fa-tachometer-alt"></i> &nbsp;Dashboard</p>
            <p><i class="fas fa-microchip"></i> &nbsp;Hardware Live</p>
        </div>
    </div>

    <!-- Main Dynamic Interface Area -->
    <div class="main">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>Campus Hygiene Monitoring</h1>
            <div id="live-time" style="font-weight: bold; color: var(--primary-pink);"></div>
        </header>

        <!-- Highlight Area: Reconstructed Live Kit Model -->
        <div class="live-kit-card">
            <div>
                <h3 style="margin:0; color: #666;"><i class="fas fa-broadcast-tower"></i> PHYSICAL KIT MODEL</h3>
                <p id="monitoring-loc" style="margin:5px 0; font-weight: bold;">Monitoring: Block A (Floor 1)</p>
            </div>
            <div class="kit-value" id="kit-stock-val">0%</div>
            <div>
                <span id="kit-status-label" class="status-pill online" style="font-size: 16px;">System Ready</span>
            </div>
        </div>

        <!-- Campus Records Table Container -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Block Location</th>
                        <th>Floor Level</th>
                        <th>Current Stock</th>
                        <th>Machine Status</th>
                    </tr>
                </thead>
                <tbody id="machineBody">
                    <!-- Iterated data blocks will stream here dynamically -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Real-time System Clock
        setInterval(() => {
            document.getElementById('live-time').innerText = new Date().toLocaleString();
        }, 1000);

        // Firebase Configuration Node
        const firebaseConfig = {
            databaseURL: "https://smart-sakhi-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Project Map Arrays
        const blocks = ["Block A", "Block B", "Block C", "Block D", "Block E", "Library Block"];
        const floors = ["1st Floor", "2nd Floor", "3rd Floor", "4th Floor"];
        const tableBody = document.getElementById('machineBody');

        // Render Matrix Setup & Event Subscriptions
        blocks.forEach(block => {
            floors.forEach(floor => {
                const stockId = `stock-${block}-${floor}`.replace(/\s+/g, '-');
                const pillId = `pill-${block}-${floor}`.replace(/\s+/g, '-');

                // Dynamic HTML Row Injection
                let row = `<tr>
                    <td><b>${block}</b></td>
                    <td>${floor}</td>
                    <td id="${stockId}"><b>0%</b></td>
                    <td><span id="${pillId}" class="status-pill online">Active</span></td>
                </tr>`;
                tableBody.innerHTML += row;

                // Normalized Firebase database path mapping
                let dbPath = `/AKS_University/${block.replace(" ", "_")}/${floor.replace(" ", "_")}`;

                // Continuous Database Stream Event
                database.ref(dbPath).on('value', (snapshot) => {
                    const stock = snapshot.val() || 0;
                    const stockText = document.getElementById(stockId);
                    const pill = document.getElementById(pillId);

                    if (stockText && pill) {
                        // Update Table Cells UI
                        stockText.innerHTML = `<b>${stock}%</b>`;
                        stockText.style.color = stock < 15 ? 'red' : 'black';
                        pill.className = `status-pill ${stock < 15 ? 'critical' : 'online'}`;
                        pill.innerText = stock < 15 ? 'Low Stock' : 'Active';
                    }

                    // Direct pipeline hookup for the physical demo unit
                    if (block === "Block A" && floor === "1st Floor") {
                        updateLiveKit(stock);
                    }
                });
            });
        });

        // Mutator function to drive data updates down to the Top Card Engine
        function updateLiveKit(val) {
            const display = document.getElementById('kit-stock-val');
            const label = document.getElementById('kit-status-label');

            if (display && label) {
                display.innerText = val + "%";
                display.style.color = val < 15 ? 'var(--danger-red)' : 'var(--dark-blue)';

                if (val < 15) {
                    label.className = "status-pill critical";
                    label.innerText = "CRITICAL: REFILL NOW";
                } else {
                    label.className = "status-pill online";
                    label.innerText = "STOCK HEALTHY";
                }
            }
        }
    </script>
</body>

</html>
